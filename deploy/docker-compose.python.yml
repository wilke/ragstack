services:
  api:
    build:
      context: ../python
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      - qdrant
      - elasticsearch
      - neo4j
      - postgres
      - redis
    restart: unless-stopped

  worker:
    build:
      context: ../python
      dockerfile: docker/Dockerfile
    command: celery -A ragstack.worker worker --loglevel=info
    env_file: ../.env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
