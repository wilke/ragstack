services:
  crossencoder-sidecar:
    build:
      context: ../sidecars/crossencoder
    ports:
      - "50052:50052"
    environment:
      - MODEL_NAME=${CROSSENCODER_MODEL:-BAAI/bge-reranker-v2-m3}
      - DEVICE=${SIDECAR_DEVICE:-cpu}
    restart: unless-stopped

  embedding-sidecar:
    build:
      context: ../sidecars/embedding
    ports:
      - "50053:50053"
    environment:
      - MODEL_NAME=${EMBEDDING_MODEL:-BAAI/bge-base-en-v1.5}
      - DEVICE=${SIDECAR_DEVICE:-cpu}
    restart: unless-stopped

  faiss-sidecar:
    build:
      context: ../sidecars/faiss
    ports:
      - "50051:50051"
    volumes:
      - faiss_data:/data
    restart: unless-stopped

volumes:
  faiss_data:
